<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>スマカレ — コールセンター受電入力フォーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #f8fafc; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
@keyframes slide-up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.slide-up { animation: slide-up .3s ease-out; }
@keyframes fade-in { from{opacity:0} to{opacity:1} }
.fade-in { animation: fade-in .25s ease-out; }
</style>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { sans: ['Inter','Noto Sans JP','sans-serif'] } } }
};
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CATS = [
  { id: "fuyouhin", label: "不用品回収",        color: "#6366f1" },
  { id: "hikkoshi", label: "引っ越し",          color: "#8b5cf6" },
  { id: "cleaning", label: "ハウスクリーニング",  color: "#06b6d4" },
  { id: "suidou",   label: "水道修理",          color: "#3b82f6" },
  { id: "kagi",     label: "鍵トラブル",        color: "#f59e0b" },
  { id: "repair",   label: "修理・メンテナンス", color: "#10b981" },
];
const PREFS = ["東京都","神奈川県","埼玉県","千葉県","大阪府","愛知県","福岡県","北海道","京都府","兵庫県"];
const CENTERS = ["ネコ","わん"];
const CHANNELS = ["受電","LINE","Web"];
const TIMES = ["","9-12時","10-12時","12-15時","14-17時","15-18時","時間指定なし"];

const EMPTY_FORM = {
  pref: "", center: CENTERS[0], channel: CHANNELS[0], op: "",
  name: "", phone: "", postal: "", addr: "",
  date: "", time: "", cat: "fuyouhin", items: "", note: "",
};

const Field = ({ label, required, children }) => (
  <div>
    <label className="text-xs font-medium text-slate-500 mb-1.5 block">
      {label}{required && <span className="text-red-400 ml-0.5">*</span>}
    </label>
    {children}
  </div>
);

const inputCls = "w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-colors";
const selectCls = inputCls;

function App() {
  const [form, setForm] = useState(EMPTY_FORM);
  const [submitted, setSubmitted] = useState(false);
  const [submittedData, setSubmittedData] = useState(null);
  const [errors, setErrors] = useState({});

  const setF = (k, v) => {
    setForm(prev => ({ ...prev, [k]: v }));
    if (errors[k]) setErrors(prev => ({ ...prev, [k]: false }));
  };

  const validate = () => {
    const e = {};
    if (!form.name.trim())  e.name  = "顧客名を入力してください";
    if (!form.phone.trim()) e.phone = "電話番号を入力してください";
    if (!form.date)         e.date  = "希望日を選択してください";
    return e;
  };

  const submit = () => {
    const e = validate();
    if (Object.keys(e).length > 0) { setErrors(e); return; }
    setSubmittedData({ ...form, submittedAt: new Date().toLocaleString("ja-JP") });
    setSubmitted(true);
    setForm(EMPTY_FORM);
    setErrors({});
  };

  const reset = () => {
    setSubmitted(false);
    setSubmittedData(null);
    setForm(EMPTY_FORM);
    setErrors({});
  };

  const catInfo = CATS.find(c => c.id === form.cat) || CATS[0];
  const isValid = form.name.trim() && form.phone.trim() && form.date;

  if (submitted && submittedData) {
    return (
      <div className="min-h-screen flex items-start justify-center pt-10 px-4 pb-10 fade-in">
        <div className="w-full max-w-lg">
          {/* Header */}
          <div className="flex items-center gap-3 mb-8">
            <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
              </svg>
            </div>
            <div>
              <h1 className="text-base font-bold text-slate-800">スマカレ</h1>
              <p className="text-xs text-slate-400">コールセンター受電入力フォーム</p>
            </div>
          </div>

          {/* Success Card */}
          <div className="bg-white rounded-2xl border border-emerald-200 shadow-sm overflow-hidden slide-up">
            <div className="bg-emerald-50 px-6 py-5 flex items-center gap-4 border-b border-emerald-100">
              <div className="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center shrink-0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </div>
              <div>
                <p className="font-bold text-emerald-800">案件を登録しました</p>
                <p className="text-xs text-emerald-600 mt-0.5">スケジュール・案件管理に自動反映されました</p>
              </div>
            </div>
            <div className="p-6 space-y-2.5">
              {[
                ["顧客名", submittedData.name],
                ["電話番号", submittedData.phone],
                ["希望日", submittedData.date],
                ["希望時間帯", submittedData.time || "指定なし"],
                ["サービス", CATS.find(c => c.id === submittedData.cat)?.label],
                ["品目・荷物", submittedData.items || "—"],
                ["都道府県", submittedData.pref || "—"],
                ["センター", `${submittedData.center}（${submittedData.channel}）`],
                ["オペレーター", submittedData.op || "—"],
                ["登録日時", submittedData.submittedAt],
              ].map(([l, v]) => (
                <div key={l} className="flex text-sm">
                  <span className="text-slate-400 w-32 shrink-0">{l}</span>
                  <span className="text-slate-800 font-medium">{v}</span>
                </div>
              ))}
            </div>
            <div className="px-6 pb-6">
              <button onClick={reset}
                className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors">
                続けて入力する
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex items-start justify-center pt-8 px-4 pb-16">
      <div className="w-full max-w-lg">
        {/* Header */}
        <div className="flex items-center gap-3 mb-6">
          <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </div>
          <div>
            <h1 className="text-base font-bold text-slate-800">スマカレ</h1>
            <p className="text-xs text-slate-400">コールセンター受電入力フォーム</p>
          </div>
        </div>

        <div className="space-y-4">
          {/* コールセンター情報 */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
            <p className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-4">コールセンター情報</p>
            <div className="grid grid-cols-3 gap-3">
              <Field label="センター">
                <select value={form.center} onChange={e => setF("center", e.target.value)} className={selectCls}>
                  {CENTERS.map(c => <option key={c}>{c}</option>)}
                </select>
              </Field>
              <Field label="チャネル">
                <select value={form.channel} onChange={e => setF("channel", e.target.value)} className={selectCls}>
                  {CHANNELS.map(c => <option key={c}>{c}</option>)}
                </select>
              </Field>
              <Field label="オペレーター">
                <input value={form.op} onChange={e => setF("op", e.target.value)} placeholder="担当者名" className={inputCls}/>
              </Field>
            </div>
          </div>

          {/* 顧客情報 */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
            <p className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-4">顧客情報</p>
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <Field label="顧客名" required>
                  <input value={form.name} onChange={e => setF("name", e.target.value)}
                    placeholder="例: あかざわ たつゆき"
                    className={inputCls + (errors.name ? " border-red-300 focus:border-red-400 focus:ring-red-500/20" : "")}/>
                  {errors.name && <p className="text-xs text-red-500 mt-1">{errors.name}</p>}
                </Field>
                <Field label="電話番号" required>
                  <input value={form.phone} onChange={e => setF("phone", e.target.value)}
                    placeholder="例: 090-1234-5678" type="tel"
                    className={inputCls + (errors.phone ? " border-red-300 focus:border-red-400 focus:ring-red-500/20" : "")}/>
                  {errors.phone && <p className="text-xs text-red-500 mt-1">{errors.phone}</p>}
                </Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="郵便番号">
                  <input value={form.postal} onChange={e => setF("postal", e.target.value)}
                    placeholder="例: 248-0005" className={inputCls}/>
                </Field>
                <Field label="都道府県">
                  <select value={form.pref} onChange={e => setF("pref", e.target.value)} className={selectCls}>
                    <option value="">選択</option>
                    {PREFS.map(p => <option key={p}>{p}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="住所（詳細）">
                <input value={form.addr} onChange={e => setF("addr", e.target.value)}
                  placeholder="市区町村・番地・建物名" className={inputCls}/>
              </Field>
            </div>
          </div>

          {/* サービス情報 */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
            <p className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-4">サービス情報</p>
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <Field label="希望日" required>
                  <input value={form.date} onChange={e => setF("date", e.target.value)} type="date"
                    className={inputCls + (errors.date ? " border-red-300 focus:border-red-400 focus:ring-red-500/20" : "")}/>
                  {errors.date && <p className="text-xs text-red-500 mt-1">{errors.date}</p>}
                </Field>
                <Field label="希望時間帯">
                  <select value={form.time} onChange={e => setF("time", e.target.value)} className={selectCls}>
                    {TIMES.map(t => <option key={t} value={t}>{t || "指定なし"}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="サービスカテゴリ">
                <div className="grid grid-cols-3 gap-2">
                  {CATS.map(c => (
                    <button key={c.id} type="button" onClick={() => setF("cat", c.id)}
                      className={"py-2 px-2 rounded-xl text-xs font-medium border-2 transition-all text-center " +
                        (form.cat === c.id
                          ? "text-white border-transparent"
                          : "bg-white text-slate-600 border-slate-200 hover:border-slate-300")}
                      style={form.cat === c.id ? { backgroundColor: c.color, borderColor: c.color } : {}}>
                      {c.label}
                    </button>
                  ))}
                </div>
              </Field>
              <Field label="品目・荷物内容">
                <input value={form.items} onChange={e => setF("items", e.target.value)}
                  placeholder="例: ベッド、冷蔵庫、洗濯機" className={inputCls}/>
              </Field>
              <Field label="備考・特記事項">
                <textarea value={form.note} onChange={e => setF("note", e.target.value)}
                  rows={3} placeholder="相見積もり、緊急対応、アクセス方法など"
                  className={inputCls + " resize-none"}/>
              </Field>
            </div>
          </div>

          {/* Submit */}
          <div className="flex gap-3">
            <button onClick={submit}
              className={"flex-1 py-3.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all " +
                (isValid
                  ? "bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-200/60"
                  : "bg-slate-100 text-slate-400 cursor-not-allowed")}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z"/>
              </svg>
              案件として登録する
            </button>
            <button onClick={() => { setForm(EMPTY_FORM); setErrors({}); }}
              className="px-5 py-3.5 border border-slate-200 text-slate-600 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
              リセット
            </button>
          </div>
        </div>

        <p className="text-center text-xs text-slate-300 mt-8">Powered by スマカレ</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
