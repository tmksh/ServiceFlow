<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>スマカレ — コールセンター受電入力フォーム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #f8fafc; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
@keyframes slide-up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.slide-up { animation: slide-up .3s ease-out; }
@keyframes fade-in { from{opacity:0} to{opacity:1} }
.fade-in { animation: fade-in .25s ease-out; }
</style>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { sans: ['Inter','Noto Sans JP','sans-serif'] } } }
};
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CATS = [
  { id: "fuyouhin", label: "不用品回収",        color: "#6366f1" },
  { id: "hikkoshi", label: "引っ越し",          color: "#8b5cf6" },
  { id: "cleaning", label: "ハウスクリーニング",  color: "#06b6d4" },
  { id: "suidou",   label: "水道修理",          color: "#3b82f6" },
  { id: "kagi",     label: "鍵トラブル",        color: "#f59e0b" },
  { id: "repair",   label: "修理・メンテナンス", color: "#10b981" },
];
const PREFS = ["東京都","神奈川県","埼玉県","千葉県","大阪府","愛知県","福岡県","北海道","京都府","兵庫県"];
const CENTERS = ["ネコ","わん"];
const CHANNELS = ["受電","LINE","Web"];
const TIMES = ["","9-12時","10-12時","12-15時","14-17時","15-18時","時間指定なし"];

const EMPTY_FORM = {
  pref: "", center: CENTERS[0], channel: CHANNELS[0], op: "",
  name: "", phone: "", postal: "", addr: "",
  date: "", time: "", cat: "fuyouhin", items: "", note: "",
};

const Field = ({ label, required, children }) => (
  <div>
    <label className="text-xs font-medium text-slate-500 mb-1.5 block">
      {label}{required && <span className="text-red-400 ml-0.5">*</span>}
    </label>
    {children}
  </div>
);

const inputCls = "w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-colors";
const selectCls = inputCls;

function App() {
  const [form, setForm] = useState(EMPTY_FORM);
  const [submitted, setSubmitted] = useState(false);
  const [submittedData, setSubmittedData] = useState(null);
  const [errors, setErrors] = useState({});
  const [lineStep, setLineStep] = useState(0); // 0=待機 1=送信中 2=送信完了

  const setF = (k, v) => {
    setForm(prev => ({ ...prev, [k]: v }));
    if (errors[k]) setErrors(prev => ({ ...prev, [k]: false }));
  };

  const validate = () => {
    const e = {};
    if (!form.name.trim())  e.name  = "顧客名を入力してください";
    if (!form.phone.trim()) e.phone = "電話番号を入力してください";
    if (!form.date)         e.date  = "希望日を選択してください";
    return e;
  };

  const submit = () => {
    const e = validate();
    if (Object.keys(e).length > 0) { setErrors(e); return; }
    const data = { ...form, submittedAt: new Date().toLocaleString("ja-JP") };
    setSubmittedData(data);
    setSubmitted(true);
    setLineStep(1);
    setForm(EMPTY_FORM);
    setErrors({});
    // LINE通知送信シミュレーション
    setTimeout(() => setLineStep(2), 1800);
  };

  const reset = () => {
    setSubmitted(false);
    setSubmittedData(null);
    setForm(EMPTY_FORM);
    setErrors({});
    setLineStep(0);
  };

  const catInfo = CATS.find(c => c.id === form.cat) || CATS[0];
  const isValid = form.name.trim() && form.phone.trim() && form.date;

  if (submitted && submittedData) {
    const catInfo = CATS.find(c => c.id === submittedData.cat) || CATS[0];
    return (
      <div className="min-h-screen flex items-start justify-center pt-8 px-4 pb-16 fade-in">
        <div className="w-full max-w-lg space-y-4">
          {/* ヘッダー */}
          <div className="flex items-center gap-3 mb-2">
            <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
              </svg>
            </div>
            <div>
              <h1 className="text-base font-bold text-slate-800">スマカレ</h1>
              <p className="text-xs text-slate-400">コールセンター受電入力フォーム</p>
            </div>
          </div>

          {/* 登録完了カード */}
          <div className="bg-white rounded-2xl border border-emerald-200 shadow-sm overflow-hidden slide-up">
            <div className="bg-emerald-50 px-5 py-4 flex items-center gap-4 border-b border-emerald-100">
              <div className="w-11 h-11 rounded-full bg-emerald-500 flex items-center justify-center shrink-0">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </div>
              <div>
                <p className="font-bold text-emerald-800">案件を登録しました</p>
                <p className="text-xs text-emerald-600 mt-0.5">{submittedData.submittedAt} · スケジュールに自動反映</p>
              </div>
            </div>
            <div className="p-5">
              {/* 案件サマリー */}
              <div className="flex items-center gap-3 p-3 rounded-xl mb-4" style={{ background: catInfo.color + "10", border: `1px solid ${catInfo.color}25` }}>
                <div className="w-2 h-10 rounded-full shrink-0" style={{ background: catInfo.color }}/>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-bold text-slate-800">{submittedData.name}</div>
                  <div className="text-xs text-slate-500 mt-0.5">{catInfo.label} · {submittedData.date}{submittedData.time ? ` ${submittedData.time}` : ""}</div>
                  <div className="text-xs text-slate-400 mt-0.5">{submittedData.phone}</div>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                {[
                  ["センター", `${submittedData.center}（${submittedData.channel}）`],
                  ["オペレーター", submittedData.op || "—"],
                  ["都道府県", submittedData.pref || "—"],
                  ["品目", submittedData.items || "—"],
                ].map(([l, v]) => (
                  <div key={l} className="bg-slate-50 rounded-xl p-3">
                    <div className="text-[10px] text-slate-400 font-medium">{l}</div>
                    <div className="text-sm text-slate-700 font-medium mt-0.5 truncate">{v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ─── LINE通知フロー ─── */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden slide-up">
            <div className="px-5 py-4 border-b border-slate-100">
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{ background: "#06C755" }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
                  </svg>
                </div>
                <div>
                  <h3 className="text-sm font-bold text-slate-800">LINE通知フロー</h3>
                  <p className="text-xs text-slate-400">フォーム → LINEグループ → スマカレ反映</p>
                </div>
              </div>
            </div>
            <div className="p-5">
              {/* ステップ表示 */}
              <div className="space-y-3">
                {/* Step 1: フォーム入力完了 */}
                <div className="flex items-start gap-3">
                  <div className="w-6 h-6 rounded-full bg-emerald-500 flex items-center justify-center shrink-0 mt-0.5">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </div>
                  <div className="flex-1">
                    <div className="flex items-center justify-between">
                      <span className="text-sm font-semibold text-slate-800">フォーム入力完了</span>
                      <span className="text-xs text-emerald-600 font-medium">完了</span>
                    </div>
                    <p className="text-xs text-slate-400 mt-0.5">オペレーターが受電情報を入力・送信</p>
                  </div>
                </div>

                <div className="flex items-center gap-3 pl-3">
                  <div className="w-0.5 h-6 bg-slate-200 ml-0"/>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </div>

                {/* Step 2: LINEグループ通知 */}
                <div className="flex items-start gap-3">
                  <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 mt-0.5 transition-all duration-500 ${lineStep >= 2 ? "bg-emerald-500" : lineStep === 1 ? "bg-green-400" : "bg-slate-200"}`}>
                    {lineStep >= 2 ? (
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    ) : lineStep === 1 ? (
                      <div className="w-3 h-3 flex items-center justify-center">
                        <div className="w-2 h-2 bg-white rounded-full animate-ping"/>
                      </div>
                    ) : (
                      <span className="text-[10px] font-bold text-slate-400">2</span>
                    )}
                  </div>
                  <div className="flex-1">
                    <div className="flex items-center justify-between">
                      <span className={`text-sm font-semibold ${lineStep >= 1 ? "text-slate-800" : "text-slate-400"}`}>LINEグループへ通知</span>
                      <span className={`text-xs font-medium ${lineStep >= 2 ? "text-emerald-600" : lineStep === 1 ? "text-green-500" : "text-slate-400"}`}>
                        {lineStep >= 2 ? "送信完了" : lineStep === 1 ? "送信中..." : "待機中"}
                      </span>
                    </div>
                    <p className="text-xs text-slate-400 mt-0.5">担当LINEグループへ案件情報を自動送信</p>
                    {/* LINE通知プレビュー */}
                    {lineStep >= 1 && (
                      <div className="mt-2 p-3 rounded-xl text-xs font-mono text-green-400 bg-slate-800 leading-relaxed slide-up">
                        <div className="text-slate-400 mb-1 text-[10px]">📤 LINEグループ: {submittedData.center}チーム</div>
                        {submittedData.pref}　{submittedData.center}　{submittedData.channel}　{submittedData.op || "—"}{"\n"}
                        {submittedData.name}{"\n"}
                        {submittedData.phone}{"\n"}
                        {submittedData.date}{submittedData.time ? `　${submittedData.time}` : ""}{"\n"}
                        {catInfo.label}{submittedData.items ? `　${submittedData.items}` : ""}
                        {lineStep >= 2 && <div className="text-emerald-400 mt-1">✓ 送信済み</div>}
                      </div>
                    )}
                  </div>
                </div>

                <div className="flex items-center gap-3 pl-3">
                  <div className="w-0.5 h-6 bg-slate-200 ml-0"/>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </div>

                {/* Step 3: スマカレ反映 */}
                <div className="flex items-start gap-3">
                  <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 mt-0.5 transition-all duration-500 ${lineStep >= 2 ? "bg-emerald-500" : "bg-slate-200"}`}>
                    {lineStep >= 2 ? (
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                      </svg>
                    ) : (
                      <span className="text-[10px] font-bold text-slate-400">3</span>
                    )}
                  </div>
                  <div className="flex-1">
                    <div className="flex items-center justify-between">
                      <span className={`text-sm font-semibold ${lineStep >= 2 ? "text-slate-800" : "text-slate-400"}`}>スマカレに自動反映</span>
                      <span className={`text-xs font-medium ${lineStep >= 2 ? "text-emerald-600" : "text-slate-400"}`}>
                        {lineStep >= 2 ? "反映完了" : "待機中"}
                      </span>
                    </div>
                    <p className="text-xs text-slate-400 mt-0.5">LINE受信 → 解析 → 案件登録 → スケジュール反映</p>
                  </div>
                </div>
              </div>

              {/* 完了後メッセージ */}
              {lineStep >= 2 && (
                <div className="mt-4 p-3 bg-indigo-50 rounded-xl border border-indigo-100 slide-up">
                  <p className="text-xs text-indigo-700 font-medium">
                    ✓ 担当チームへのLINE通知が完了しました。スマカレの「LINE受信」タブで確認できます。
                  </p>
                </div>
              )}
            </div>
          </div>

          <button onClick={reset}
            className="w-full py-3 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200">
            続けて入力する
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex items-start justify-center pt-8 px-4 pb-16">
      <div className="w-full max-w-lg">
        {/* Header */}
        <div className="flex items-center gap-3 mb-6">
          <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
            </svg>
          </div>
          <div>
            <h1 className="text-base font-bold text-slate-800">スマカレ</h1>
            <p className="text-xs text-slate-400">コールセンター受電入力フォーム</p>
          </div>
        </div>

        <div className="space-y-4">
          {/* コールセンター情報 */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
            <p className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-4">コールセンター情報</p>
            <div className="grid grid-cols-3 gap-3">
              <Field label="センター">
                <select value={form.center} onChange={e => setF("center", e.target.value)} className={selectCls}>
                  {CENTERS.map(c => <option key={c}>{c}</option>)}
                </select>
              </Field>
              <Field label="チャネル">
                <select value={form.channel} onChange={e => setF("channel", e.target.value)} className={selectCls}>
                  {CHANNELS.map(c => <option key={c}>{c}</option>)}
                </select>
              </Field>
              <Field label="オペレーター">
                <input value={form.op} onChange={e => setF("op", e.target.value)} placeholder="担当者名" className={inputCls}/>
              </Field>
            </div>
          </div>

          {/* 顧客情報 */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
            <p className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-4">顧客情報</p>
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <Field label="顧客名" required>
                  <input value={form.name} onChange={e => setF("name", e.target.value)}
                    placeholder="例: あかざわ たつゆき"
                    className={inputCls + (errors.name ? " border-red-300 focus:border-red-400 focus:ring-red-500/20" : "")}/>
                  {errors.name && <p className="text-xs text-red-500 mt-1">{errors.name}</p>}
                </Field>
                <Field label="電話番号" required>
                  <input value={form.phone} onChange={e => setF("phone", e.target.value)}
                    placeholder="例: 090-1234-5678" type="tel"
                    className={inputCls + (errors.phone ? " border-red-300 focus:border-red-400 focus:ring-red-500/20" : "")}/>
                  {errors.phone && <p className="text-xs text-red-500 mt-1">{errors.phone}</p>}
                </Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="郵便番号">
                  <input value={form.postal} onChange={e => setF("postal", e.target.value)}
                    placeholder="例: 248-0005" className={inputCls}/>
                </Field>
                <Field label="都道府県">
                  <select value={form.pref} onChange={e => setF("pref", e.target.value)} className={selectCls}>
                    <option value="">選択</option>
                    {PREFS.map(p => <option key={p}>{p}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="住所（詳細）">
                <input value={form.addr} onChange={e => setF("addr", e.target.value)}
                  placeholder="市区町村・番地・建物名" className={inputCls}/>
              </Field>
            </div>
          </div>

          {/* サービス情報 */}
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
            <p className="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-4">サービス情報</p>
            <div className="space-y-3">
              <div className="grid grid-cols-2 gap-3">
                <Field label="希望日" required>
                  <input value={form.date} onChange={e => setF("date", e.target.value)} type="date"
                    className={inputCls + (errors.date ? " border-red-300 focus:border-red-400 focus:ring-red-500/20" : "")}/>
                  {errors.date && <p className="text-xs text-red-500 mt-1">{errors.date}</p>}
                </Field>
                <Field label="希望時間帯">
                  <select value={form.time} onChange={e => setF("time", e.target.value)} className={selectCls}>
                    {TIMES.map(t => <option key={t} value={t}>{t || "指定なし"}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="サービスカテゴリ">
                <div className="grid grid-cols-3 gap-2">
                  {CATS.map(c => (
                    <button key={c.id} type="button" onClick={() => setF("cat", c.id)}
                      className={"py-2 px-2 rounded-xl text-xs font-medium border-2 transition-all text-center " +
                        (form.cat === c.id
                          ? "text-white border-transparent"
                          : "bg-white text-slate-600 border-slate-200 hover:border-slate-300")}
                      style={form.cat === c.id ? { backgroundColor: c.color, borderColor: c.color } : {}}>
                      {c.label}
                    </button>
                  ))}
                </div>
              </Field>
              <Field label="品目・荷物内容">
                <input value={form.items} onChange={e => setF("items", e.target.value)}
                  placeholder="例: ベッド、冷蔵庫、洗濯機" className={inputCls}/>
              </Field>
              <Field label="備考・特記事項">
                <textarea value={form.note} onChange={e => setF("note", e.target.value)}
                  rows={3} placeholder="相見積もり、緊急対応、アクセス方法など"
                  className={inputCls + " resize-none"}/>
              </Field>
            </div>
          </div>

          {/* Submit */}
          <div className="flex gap-3">
            <button onClick={submit}
              className={"flex-1 py-3.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all " +
                (isValid
                  ? "bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-200/60"
                  : "bg-slate-100 text-slate-400 cursor-not-allowed")}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z"/>
              </svg>
              案件として登録する
            </button>
            <button onClick={() => { setForm(EMPTY_FORM); setErrors({}); }}
              className="px-5 py-3.5 border border-slate-200 text-slate-600 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
              リセット
            </button>
          </div>
        </div>

        <p className="text-center text-xs text-slate-300 mt-8">Powered by スマカレ</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
