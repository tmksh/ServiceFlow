*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ═══════════════════════════════════════════════════════

const BarSVG = ({ data, dk, w = 500, h = 220, color = "#6366f1" }) => {
  const max = Math.max(...data.map(d => d[dk]));
  const bw = Math.min(28, (w - 60) / data.length - 4);
  const sx = 50;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{ maxHeight: h }}>
      {[0, .25, .5, .75, 1].map(f => {
        const y = h - 30 - (h - 50) * f;
        return (
          <g key={f}>
            <line x1={sx} y1={y} x2={w} y2={y} stroke="#f1f5f9" strokeWidth="1"/>
            <text x={sx - 5} y={y + 4} textAnchor="end" fill="#94a3b8" fontSize="10">
              {Math.round(max * f).toLocaleString()}
            </text>
          </g>
        );
      })}
      {data.map((d, i) => {
        const bh = max > 0 ? (d[dk] / max) * (h - 50) : 0;
        const x = sx + i * ((w - sx) / data.length) + (w - sx) / data.length / 2 - bw / 2;
        const y = h - 30 - bh;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx={bw / 4} fill={color}
              className="bar-grow" style={{ animationDelay: `${i * 50}ms` }} opacity=".85">
              <title>{d[dk].toLocaleString()}</title>
            </rect>
            <text x={x + bw / 2} y={h - 12} textAnchor="middle" fill="#94a3b8" fontSize="10">
              {d.label || ""}
            </text>
          </g>
        );
      })}
    </svg>
  );
};

const AreaSVG = ({ data, dk, w = 500, h = 220, color = "#6366f1", gid = "ag" }) => {
  const max = Math.max(...data.map(d => d[dk])) * 1.15;
  const pts = data.map((d, i) => ({
    x: 50 + i * ((w - 60) / (data.length - 1)),
    y: h - 30 - ((d[dk] / max) * (h - 50))
  }));
  const pathD = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
  const areaD = pathD + ` L${pts[pts.length - 1].x},${h - 30} L${pts[0].x},${h - 30} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{ maxHeight: h }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".15"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0, .25, .5, .75, 1].map(f => {
        const y = h - 30 - (h - 50) * f;
        return (
          <g key={f}>
            <line x1="50" y1={y} x2={w} y2={y} stroke="#f1f5f9" strokeWidth="1"/>
            <text x="45" y={y + 4} textAnchor="end" fill="#94a3b8" fontSize="10">
              {Math.round(max * f).toLocaleString()}
            </text>
          </g>
        );
      })}
      <path d={areaD} fill={`url(#${gid})`}/>
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" className="line-draw"/>
      {pts.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="4" fill={color} stroke="white" strokeWidth="2"/>
      ))}
      {data.map((d, i) => (
        <text key={i} x={pts[i].x} y={h - 12} textAnchor="middle" fill="#94a3b8" fontSize="10">
          {d.label || ""}
        </text>
      ))}
    </svg>
  );
};

const Donut = ({ data, size = 170 }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  const r = size / 2 - 14;
  const cx = size / 2, cy = size / 2;
  let cum = 0;
  const arcs = data.map(d => {
    const sa = (cum / total) * 360 - 90; cum += d.value;
    const ea = (cum / total) * 360 - 90;
    const s = { x: cx + r * Math.cos(sa * Math.PI / 180), y: cy + r * Math.sin(sa * Math.PI / 180) };
    const e = { x: cx + r * Math.cos(ea * Math.PI / 180), y: cy + r * Math.sin(ea * Math.PI / 180) };
    return { ...d, d: `M${s.x},${s.y} A${r},${r} 0 ${ea - sa > 180 ? 1 : 0} 1 ${e.x},${e.y}` };
  });
  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full" style={{ maxWidth: size, margin: "0 auto" }}>
      {arcs.map((a, i) => (
        <path key={i} d={a.d} fill="none" stroke={a.color} strokeWidth="20" strokeLinecap="round"/>
      ))}
      <text x={cx} y={cy - 4} textAnchor="middle" fill="#1e293b" fontSize="20" fontWeight="700">{total}</text>
      <text x={cx} y={cy + 14} textAnchor="middle" fill="#94a3b8" fontSize="10">総案件</text>
    </svg>
  );
};

/* ─── TimeTree ライク タイムラインカレンダー ─── */
const TIME_SLOTS = Array.from({ length: 13 }, (_, i) => i + 7); // 7〜19時

/* 時間帯 → ピンカラー（マップビュー用）*/
const timeBandColor = (timeStr) => {
  if (!timeStr) return "#94a3b8";
  const h = parseInt(timeStr.split(":")[0], 10);
  if (h < 12)  return "#6366f1"; // 午前: indigo
  if (h < 15)  return "#f59e0b"; // 12〜15時: amber
  if (h < 17)  return "#10b981"; // 15〜17時: emerald
  return "#ef4444";              // 17時以降: red
};
const timeBandLabel = (timeStr) => {
  if (!timeStr) return "時間未定";
  const h = parseInt(timeStr.split(":")[0], 10);
  if (h < 12)  return "午前";
  if (h < 15)  return "12〜15時";
  if (h < 17)  return "15〜17時";
  return "17時以降";
};

];

  const [calMode, setCalMode] = useState("week"); // "month" | "week" | "day" | "map"

  const mn = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const dn = ["日","月","火","水","木","金","土"];

  /* 月の日数・週初め */
  const dim = new Date(y, m + 1, 0).getDate();
  const fd  = new Date(y, m, 1).getDay();
  const ms  = `${y}-${String(m + 1).padStart(2, "0")}`;
  const isToday = d => d === 13 && m === 1 && y === 2026;

  /* 日付→案件マップ */
  const cByDate = useMemo(() => {
    const map = {};
    CASES.forEach(c => { if (!map[c.date]) map[c.date] = []; map[c.date].push(c); });
    return map;
  }, []);

  /* 選択日の案件 */
  const selDateStr = `${ms}-${String(selDay).padStart(2, "0")}`;
  const selCases = cByDate[selDateStr] || CASES.slice(0, 6);

  /* 週表示: 選択日の週7日 */
  const weekDays = useMemo(() => {
    const d = new Date(y, m, selDay);
    const dow = d.getDay();
    return Array.from({ length: 7 }, (_, i) => {
      const dd = new Date(y, m, selDay - dow + i);
      return { date: dd.getDate(), month: dd.getMonth(), year: dd.getFullYear(), dow: i,
        dateStr: `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,"0")}-${String(dd.getDate()).padStart(2,"0")}` };
    });
  }, [selDay, y, m]);

  /* 週の全案件をスロット配置 */
  const weekCaseMap = useMemo(() => {
    const map = {};
    weekDays.forEach(wd => {
      map[wd.dateStr] = (cByDate[wd.dateStr] || []).sort((a, b) => (a.time || "99").localeCompare(b.time || "99"));
    });
    return map;
  }, [weekDays, cByDate]);

  /* ─── ビューヘッダー ─── */
  const navPrev = () => {
    if (calMode === "month") setCur(new Date(y, m - 1, 1));
    else if (calMode === "week") setSelDay(d => Math.max(1, d - 7));
    else setSelDay(d => Math.max(1, d - 1));
  };
  const navNext = () => {
    if (calMode === "month") setCur(new Date(y, m + 1, 1));
    else if (calMode === "week") setSelDay(d => Math.min(dim, d + 7));
    else setSelDay(d => Math.min(dim, d + 1));
  };
  const headerLabel = () => {
    if (calMode === "month") return `${y}年 ${mn[m]}`;
    if (calMode === "day")   return `${y}年${mn[m].replace("月","")}月${selDay}日（${dn[new Date(y,m,selDay).getDay()]}）`;
    const w0 = weekDays[0], w6 = weekDays[6];
    return `${mn[w0.month]}${w0.date}日 〜 ${mn[w6.month]}${w6.date}日`;
  };

  /* ─── 月ビュー ─── */
  const MonthView = () => {
    const days = [];
    for (let i = 0; i < fd; i++) days.push(null);
    for (let i = 1; i <= dim; i++) days.push(i);
    return (
      <div>
        {/* 曜日ヘッダー */}
        <div className="grid grid-cols-7">
          {dn.map((d, i) => (
            <div key={d} className={cn("py-2 text-center text-xs font-semibold border-b border-slate-100",
              i === 0 ? "text-rose-400" : i === 6 ? "text-blue-400" : "text-slate-400")}>{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 border-l border-t border-slate-100">
          {days.map((d, i) => {
            const ds = d ? `${ms}-${String(d).padStart(2,"0")}` : null;
            const dc = ds ? (cByDate[ds] || []) : [];
            const dow = i % 7;
            const isSel = d === selDay;
            return (
              <div key={i} onClick={() => d && setSelDay(d)}
                className={cn("border-r border-b border-slate-100 cursor-pointer group transition-colors",
                  "min-h-[90px] lg:min-h-[110px] p-1",
                  !d ? "bg-slate-50/40" : isSel ? "bg-indigo-50/60" : "hover:bg-slate-50/80"
                )}>
                {d && (
                  <>
                    <div className={cn("w-7 h-7 flex items-center justify-center rounded-full text-xs font-semibold mb-1 mx-auto",
                      isToday(d) ? "bg-indigo-600 text-white shadow-sm shadow-indigo-300" :
                      isSel ? "bg-indigo-100 text-indigo-700" :
                      dow === 0 ? "text-rose-500" : dow === 6 ? "text-blue-500" : "text-slate-700"
                    )}>{d}</div>
                    <div className="space-y-0.5">
                      {dc.slice(0, 3).map(c => (
                        <div key={c.id} onClick={e => { e.stopPropagation(); setSelCase(c); }}
                          className="flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[10px] truncate cursor-pointer hover:opacity-75"
                          style={{ background: c.category.color + "18", color: c.category.color }}>
                          {c.urgent && <ic.Zap size={9}/>}
                          <span className="truncate font-medium leading-tight">{c.time} {c.customer}</span>
                        </div>
                      ))}
                      {dc.length > 3 && (
                        <div className="text-[10px] text-slate-400 pl-1 font-medium">+{dc.length - 3}件</div>
                      )}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  /* ─── 週ビュー タイムライン（TimeTreeライク） ─── */
  const WeekView = () => (
    <div className="overflow-x-auto">
      <div style={{ minWidth: 640 }}>
        {/* 日付ヘッダー行 */}
        <div className="flex border-b border-slate-100 sticky top-0 bg-white z-10">
          <div className="w-14 shrink-0 border-r border-slate-100"/>
          {weekDays.map((wd, i) => {
            const isSel = wd.date === selDay && wd.month === m;
            const isT   = wd.date === 13 && wd.month === 1 && wd.year === 2026;
            return (
              <div key={i} onClick={() => { if(wd.month === m) setSelDay(wd.date); }}
                className={cn("flex-1 text-center py-2.5 cursor-pointer select-none transition-colors",
                  isSel ? "bg-indigo-50" : "hover:bg-slate-50"
                )}>
                <div className={cn("text-[11px] font-medium mb-1",
                  i === 0 ? "text-rose-400" : i === 6 ? "text-blue-400" : "text-slate-400")}>{dn[i]}</div>
                <div className={cn("w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold mx-auto",
                  isT ? "bg-indigo-600 text-white shadow shadow-indigo-300" :
                  isSel ? "bg-indigo-100 text-indigo-700" :
                  i === 0 ? "text-rose-500" : i === 6 ? "text-blue-500" : "text-slate-700"
                )}>{wd.date}</div>
                {/* 案件数ドット */}
                {(weekCaseMap[wd.dateStr] || []).length > 0 && (
                  <div className="flex justify-center gap-0.5 mt-1">
                    {(weekCaseMap[wd.dateStr] || []).slice(0,3).map((c, j) => (
                      <div key={j} className="w-1.5 h-1.5 rounded-full" style={{ background: c.category.color }}/>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* タイムスロット */}
        <div className="overflow-y-auto" style={{ maxHeight: 480 }}>
          {TIME_SLOTS.map(hour => (
            <div key={hour} className="flex border-b border-slate-50 group min-h-[56px]">
              {/* 時刻ラベル */}
              <div className="w-14 shrink-0 border-r border-slate-100 text-[11px] text-slate-400 text-right pr-2 pt-1 font-medium select-none">
                {hour}:00
              </div>
              {/* 各日のセル */}
              {weekDays.map((wd, di) => {
                const dayCases = (weekCaseMap[wd.dateStr] || []).filter(c => {
                  if (!c.time) return false;
                  const h = parseInt(c.time.split(":")[0], 10);
                  return h === hour;
                });
                const isSel = wd.date === selDay && wd.month === m;
                return (
                  <div key={di} className={cn("flex-1 border-r border-slate-50 p-0.5 relative",
                    isSel ? "bg-indigo-50/30" : "hover:bg-slate-50/60"
                  )}>
                    {dayCases.map(c => (
                      <div key={c.id} onClick={() => setSelCase(c)}
                        className="mb-0.5 rounded-lg px-2 py-1 cursor-pointer hover:opacity-80 transition-opacity text-white text-[11px] leading-tight shadow-sm"
                        style={{ background: c.category.color }}>
                        <div className="font-semibold truncate flex items-center gap-1">
                          {c.urgent && <ic.Zap size={9}/>}{c.time}
                        </div>
                        <div className="truncate opacity-90">{c.customer}</div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  /* ─── 日ビュー タイムライン ─── */
  const DayView = () => (
    <div className="overflow-y-auto" style={{ maxHeight: 560 }}>
      {TIME_SLOTS.map(hour => {
        const slotCases = selCases.filter(c => c.time && parseInt(c.time.split(":")[0],10) === hour);
        return (
          <div key={hour} className={cn("flex border-b border-slate-50 min-h-[60px]",
            slotCases.length > 0 ? "" : "hover:bg-slate-50/40")}>
            <div className="w-16 shrink-0 text-[12px] text-slate-400 text-right pr-3 pt-2 font-medium select-none border-r border-slate-100">
              {hour}:00
            </div>
            <div className="flex-1 px-2 py-1 space-y-1">
              {slotCases.map(c => (
                <div key={c.id} onClick={() => setSelCase(c)}
                  className="flex items-center gap-3 p-2.5 rounded-xl cursor-pointer hover:shadow-sm transition-all border border-transparent hover:border-slate-100"
                  style={{ background: c.category.color + "12" }}>
                  <div className="w-1.5 h-10 rounded-full shrink-0" style={{ background: c.category.color }}/>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="text-sm font-semibold text-slate-800">{c.time}</span>
                      <span className="text-sm text-slate-700">{c.customer}</span>
                      {c.urgent && <Badge className="bg-amber-100 text-amber-700"><ic.Zap size={10}/>緊急</Badge>}
                    </div>
                    <div className="text-xs text-slate-400 mt-0.5">{c.category.label} · {c.addr} · {c.staff}</div>
                  </div>
                  <div className="text-sm font-semibold text-slate-600 shrink-0">{c.amount > 0 ? fmt(c.amount) : ""}</div>
                </div>
              ))}
              {slotCases.length === 0 && <div className="h-4"/>}
            </div>
          </div>
        );
      })}
    </div>
  );

  /* ─── マップビュー（時間帯別カラーピン） ─── */
  const MapView = () => {
    const pinCases = selCases.filter(c => c.addr).slice(0, 12);
    const bands = [
      { label: "午前（〜12時）",    color: "#6366f1" },
      { label: "12〜15時",         color: "#f59e0b" },
      { label: "15〜17時",         color: "#10b981" },
      { label: "17時以降",         color: "#ef4444" },
    ];
    return (
      <div className="space-y-4">
        {/* 凡例 */}
        <div className="flex flex-wrap gap-3 px-1">
          {bands.map(b => (
            <div key={b.label} className="flex items-center gap-1.5">
              <div className="w-3 h-3 rounded-full" style={{ background: b.color }}/>
              <span className="text-xs text-slate-500">{b.label}</span>
            </div>
          ))}
        </div>

        {/* 地図エリア（SVGモックマップ） */}
        <div className="relative bg-gradient-to-br from-slate-100 to-slate-200 rounded-2xl overflow-hidden border border-slate-200" style={{ height: 380 }}>
          {/* 背景グリッド（道路風） */}
          <svg width="100%" height="100%" className="absolute inset-0 opacity-30" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <pattern id="roadGrid" width="60" height="60" patternUnits="userSpaceOnUse">
                <line x1="0" y1="30" x2="60" y2="30" stroke="#94a3b8" strokeWidth="1.5"/>
                <line x1="30" y1="0" x2="30" y2="60" stroke="#94a3b8" strokeWidth="1"/>
              </pattern>
              <pattern id="majorRoad" width="180" height="180" patternUnits="userSpaceOnUse">
                <line x1="0" y1="90" x2="180" y2="90" stroke="#64748b" strokeWidth="3"/>
                <line x1="90" y1="0" x2="90" y2="180" stroke="#64748b" strokeWidth="2"/>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#roadGrid)"/>
            <rect width="100%" height="100%" fill="url(#majorRoad)"/>
          </svg>
          {/* 地名ラベル（デモ） */}
          {["渋谷区","新宿区","港区","品川区","目黒区"].map((t, i) => (
            <div key={t} className="absolute text-[11px] font-medium text-slate-400 select-none pointer-events-none"
              style={{ left: `${15 + i * 17}%`, top: `${20 + (i%3)*25}%` }}>{t}</div>
          ))}

          {/* ピン */}
          {pinCases.map((c, i) => {
            const pos = PIN_COORDS[i % PIN_COORDS.length];
            const color = timeBandColor(c.time);
            const isHovered = mapTooltip?.id === c.id;
            return (
              <div key={c.id}
                onMouseEnter={() => setMapTooltip(c)}
                onMouseLeave={() => setMapTooltip(null)}
                onClick={() => setSelCase(c)}
                className="absolute cursor-pointer transition-transform hover:scale-125"
                style={{ left: `${pos.x}%`, top: `${pos.y}%`, transform: "translate(-50%,-100%)" }}>
                {/* ピン本体 */}
                <svg width="28" height="36" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg"
                  style={{ filter: isHovered ? `drop-shadow(0 4px 8px ${color}88)` : `drop-shadow(0 2px 4px ${color}44)` }}>
                  <path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.27 21.73 0 14 0z"
                    fill={color}/>
                  <circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/>
                  <text x="14" y="18" textAnchor="middle" fontSize="9" fontWeight="700" fill={color}>{i+1}</text>
                </svg>
                {/* ツールチップ */}
                {isHovered && (
                  <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 bg-slate-900 text-white rounded-xl px-3 py-2 text-xs whitespace-nowrap z-50 shadow-xl slide-up pointer-events-none"
                    style={{ minWidth: 160 }}>
                    <div className="font-bold">{c.customer}</div>
                    <div className="text-slate-300 mt-0.5">{c.time} · {c.category.label}</div>
                    <div className="text-slate-400 mt-0.5 truncate" style={{ maxWidth: 180 }}>{c.addr}</div>
                    <div className="absolute top-full left-1/2 -translate-x-1/2 w-2 h-2 bg-slate-900 rotate-45 -mt-1"/>
                  </div>
                )}
              </div>
            );
          })}

          {/* 日付表示 */}
          <div className="absolute top-3 right-3 bg-white/90 backdrop-blur rounded-xl px-3 py-1.5 text-xs font-semibold text-slate-700 shadow-sm border border-slate-200">
            {mn[m].replace("月","")}月{selDay}日 · {selCases.length}件
          </div>
        </div>

        {/* ピン一覧リスト */}
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {pinCases.map((c, i) => (
            <div key={c.id} onClick={() => setSelCase(c)}
              className="flex items-center gap-3 p-3 rounded-xl border border-slate-100 hover:border-slate-200 bg-white cursor-pointer hover:shadow-sm transition-all">
              <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0"
                style={{ background: timeBandColor(c.time) }}>
                {i+1}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <span className="text-sm font-medium text-slate-800">{c.customer}</span>
                  <span className="text-xs px-1.5 py-0.5 rounded-full font-medium" style={{ background: timeBandColor(c.time)+"18", color: timeBandColor(c.time) }}>
                    {timeBandLabel(c.time)}
                  </span>
                </div>
                <div className="text-xs text-slate-400 truncate mt-0.5">{c.addr}</div>
              </div>
              <div className="text-xs text-slate-500 shrink-0">{c.time}</div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  /* ─── モバイル専用: コンパクト週セレクター + 日タイムライン ─── */
  const MobileView = () => (
    <div>
      {/* 横スクロール週ピル */}
      <div className="flex gap-1.5 overflow-x-auto pb-2 scrollbar-hide">
        {weekDays.map((wd, i) => {
          const dayCases = weekCaseMap[wd.dateStr] || [];
          const isSel = wd.date === selDay && wd.month === m;
          const isT   = wd.date === 13 && wd.month === 1 && wd.year === 2026;
          return (
            <div key={i} onClick={() => { if(wd.month === m) setSelDay(wd.date); }}
              className={cn("flex flex-col items-center rounded-2xl px-2.5 py-2 cursor-pointer transition-colors shrink-0 min-w-[44px]",
                isSel ? "bg-indigo-600" : isT ? "bg-indigo-100" : "bg-white border border-slate-100"
              )}>
              <span className={cn("text-[10px] font-medium",
                isSel ? "text-indigo-200" : i === 0 ? "text-rose-400" : i === 6 ? "text-blue-400" : "text-slate-400")}>{dn[i]}</span>
              <span className={cn("text-base font-bold mt-0.5",
                isSel ? "text-white" : isT ? "text-indigo-700" : i === 0 ? "text-rose-500" : i === 6 ? "text-blue-500" : "text-slate-700")}>{wd.date}</span>
              <div className="flex gap-0.5 mt-1">
                {dayCases.slice(0,3).map((c,j) => <div key={j} className={cn("w-1 h-1 rounded-full", isSel ? "bg-indigo-200" : "")} style={isSel ? {} : { background: c.category.color }}/>)}
              </div>
            </div>
          );
        })}
      </div>
      {/* 選択日のタイムライン */}
      <div className="mt-3 space-y-1">
        {selCases.length === 0 ? (
          <div className="text-center py-12 text-slate-300">
            <ic.Calendar size={40} className="mx-auto mb-3 opacity-40"/>
            <p className="text-sm">この日の予定はありません</p>
          </div>
        ) : selCases.map(c => (
          <div key={c.id} onClick={() => setSelCase(c)}
            className="flex items-center gap-3 p-3.5 rounded-2xl active:scale-[0.98] transition-transform cursor-pointer"
            style={{ background: c.category.color + "10", border: `1px solid ${c.category.color}25` }}>
            <div className="text-center shrink-0 w-12">
              <div className="text-sm font-bold" style={{ color: c.category.color }}>{c.time || "--"}</div>
            </div>
            <div className="w-0.5 h-10 rounded-full shrink-0" style={{ background: c.category.color }}/>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-1.5 flex-wrap">
                <span className="text-sm font-semibold text-slate-800">{c.customer}</span>
                {c.urgent && <Badge className="bg-amber-100 text-amber-700 text-[10px]"><ic.Zap size={9}/>緊急</Badge>}
              </div>
              <p className="text-xs text-slate-400 truncate mt-0.5">{c.category.label} · {c.staff}</p>
            </div>
            <ic.ChevR size={16} className="text-slate-300 shrink-0"/>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="space-y-4 fade-in">
      {/* ─── ヘッダー ─── */}
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">スケジュール管理</h1>
          
        </div>
        <button className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-medium hover:bg-indigo-700 shadow-sm shadow-indigo-200 self-start sm:self-auto">
          <ic.Plus size={16}/> 予定追加
        </button>
      </div>

      {/* ─── ビュー切り替え + ナビゲーション ─── */}
      <Card className="p-3">
        <div className="flex items-center justify-between gap-2 flex-wrap">
          {/* ナビゲーション */}
          <div className="flex items-center gap-2">
            <button onClick={navPrev} className="p-2 rounded-xl hover:bg-slate-100 active:bg-slate-200 transition-colors">
              <ic.ChevL size={18}/>
            </button>
            <button onClick={() => setSelDay(13)} className="px-3 py-1.5 text-xs font-semibold text-indigo-600 bg-indigo-50 rounded-xl hover:bg-indigo-100 transition-colors">
              今日
            </button>
            <button onClick={navNext} className="p-2 rounded-xl hover:bg-slate-100 active:bg-slate-200 transition-colors">
              <ic.ChevR size={18}/>
            </button>
            <span className="text-sm font-bold text-slate-700 ml-1">{headerLabel()}</span>
          </div>
          {/* ビュー切り替えタブ */}
          <div className="flex gap-1 bg-slate-100 rounded-xl p-1">
            {[["month","月"],["week","週"],["day","日"],["map","マップ"]].map(([k,l]) => (
              <button key={k} onClick={() => setCalMode(k)}
                className={cn("px-3 py-1.5 rounded-lg text-xs font-semibold transition-all",
                  calMode === k ? "bg-white text-indigo-700 shadow-sm" : "text-slate-500 hover:text-slate-700"
                )}>{l}</button>
            ))}
          </div>
        </div>
      </Card>

      {/* ─── カレンダー本体 ─── */}
      <Card className="overflow-hidden">
        {/* デスクトップビュー */}
        <div className="desktop-table">
          {calMode === "month" && <MonthView/>}
          {calMode === "week"  && <WeekView/>}
          {calMode === "day"   && (
            <div className="p-4">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold shadow shadow-indigo-300 shrink-0">{selDay}</div>
                <div>
                  <div className="text-sm font-bold text-slate-800">{mn[m].replace("月","")}月{selDay}日（{dn[new Date(y,m,selDay).getDay()]}）</div>
                  <div className="text-xs text-slate-400">{selCases.length}件の予定</div>
                </div>
              </div>
              <DayView/>
            </div>
          )}
          {calMode === "map" && <div className="p-4"><MapView/></div>}
        </div>
        {/* モバイルビュー */}
        <div className="mobile-card-list p-4">
          {calMode === "map" ? <MapView/> : <MobileView/>}
        </div>
      </Card>

      {/* ─── 月/週ビュー時: 選択日サマリーパネル ─── */}
      {(calMode === "month" || calMode === "week") && (
        <Card className="p-4 desktop-table">
          <div className="flex items-center justify-between mb-3">

/* StackedBarSVG for Ad Trend */
const StackedBarSVG = ({ data, keys, colors, w = 500, h = 240 }) => {
  const maxVal = Math.max(...data.map(d => keys.reduce((s, k) => s + (d[k] || 0), 0)));
  const bw = Math.min(40, (w - 60) / data.length - 8);
  const sx = 50;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full" style={{ maxHeight: h }}>
      {[0, .25, .5, .75, 1].map(f => {
        const y = h - 30 - (h - 50) * f;
        return (
          <g key={f}>
            <line x1={sx} y1={y} x2={w} y2={y} stroke="#f1f5f9" strokeWidth="1"/>
            <text x={sx - 5} y={y + 4} textAnchor="end" fill="#94a3b8" fontSize="10">{(maxVal * f / 10000).toFixed(0)}万</text>
          </g>
        );
      })}
      {data.map((d, i) => {
        let yOff = 0;
        const xPos = sx + i * ((w - sx) / data.length) + (w - sx) / data.length / 2 - bw / 2;
        return (
          <g key={i}>
            {keys.map((k, ki) => {
              const val = d[k] || 0;
              const bh = maxVal > 0 ? (val / maxVal) * (h - 50) : 0;
              const yPos = h - 30 - yOff - bh;
              yOff += bh;
              return <rect key={k} x={xPos} y={yPos} width={bw} height={bh} rx={ki === keys.length - 1 ? bw / 5 : 0} fill={colors[ki]}
                className="bar-grow" style={{ animationDelay: `${i * 60 + ki * 30}ms` }} opacity=".85"/>;
            })}
            <text x={xPos + bw / 2} y={h - 12} textAnchor="middle" fill="#94a3b8" fontSize="10">{d.label}</text>
          </g>
        );
      })}
    </svg>
  );
};

                <span className="text-xl font-bold text-indigo-600">{fmt(total)}</span>

            </div>
          </Card>

          <div className="flex gap-3">

            <button onClick={() => setStep(3)}
              disabled={form.items.some(it => !it.name || it.price <= 0)}
              className={cn("flex-1 py-3 rounded-xl text-sm font-semibold transition-colors",
                form.items.every(it => it.name && it.price > 0) ? "bg-indigo-600 text-white hover:bg-indigo-700" : "bg-slate-100 text-slate-400 cursor-not-allowed"
              )}>次へ → プレビュー・確認</button>
          </div>
        </div>
      )}

      {/* Step 3: プレビュー */}
      {step === 3 && (
        <div className="space-y-4 fade-in">
          <InvoicePreview inv={{
            id: "INV-2026-NEW",
            ...form,
            status: "draft",
            items: form.items.filter(it => it.name && it.price > 0),
          }} isNew={true}/>
          <div className="flex gap-3">
            <button onClick={() => setStep(2)} className="px-5 py-3.5 border border-slate-200 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">

/* ── 請求書メインコンポーネント ── */
const InvoicePage = () => {
  const [view, setView] = useState("list"); // "list" | "form" | "detail"
  const [selectedInv, setSelectedInv] = useState(null);

  if (view === "form") return (
    <InvoiceForm
      onBack={() => setView("list")}
      onComplete={() => setView("list")}
    />
  );

  if (view === "detail" && selectedInv) return (
    <InvoicePreview
      inv={selectedInv}
      onBack={() => { setView("list"); setSelectedInv(null); }}
    />
  );

  return (
    <div className="space-y-5 fade-in">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">請求書管理</h1>
          <SubLabel icon={ic.FileText} text="請求書発行・送付・入金管理を一元化"/>
        </div>
      </div>
      <InvoiceList
        onSelect={inv => { setSelectedInv(inv); setView("detail"); }}
        onCreate={() => setView("form")}
      />
    </div>
  );
};

              <span className="text-base">{areaInfo.flag}</span>
              <span className="flex-1 text-left text-xs font-medium text-slate-700">{areaInfo.l}</span>
              <ic.ChevD size={14} className="text-slate-400"/>
            </button>
            {areaMenuOpen && (
              <div className="absolute left-3 right-3 top-full mt-1 bg-white rounded-xl border border-slate-200 shadow-lg z-50 overflow-hidden slide-up">
                {areas.map(a => (
                  <button key={a.id} onClick={() => { setCurrentArea(a.id); setAreaMenuOpen(false); }}
                    className={cn("w-full flex items-center gap-3 px-4 py-2.5 text-sm hover:bg-slate-50 transition-colors text-left",
                      currentArea === a.id ? "bg-indigo-50 text-indigo-700 font-medium" : "text-slate-700")}>
                    <span>{a.flag}</span><span>{a.l}</span>
                    {currentArea === a.id && <ic.Check size={14} className="ml-auto"/>}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Main Navigation */}
        <nav className="flex-1 py-3 px-3 overflow-y-auto flex flex-col gap-4">
          {/* メインメニュー */}
          <div>
            {sbOpen && <p className="text-[10px] font-semibold text-slate-300 uppercase tracking-widest px-3 mb-2">メニュー</p>}
            <div className="space-y-1">
              {NAV_MAIN.map(item => {
                const active = page === item.id;
                return (
                  <button key={item.id} onClick={() => nav(item.id)} className={cn(
                    "flex items-center gap-3 w-full rounded-xl transition-all duration-200",
                    sbOpen ? "px-3 py-2.5" : "p-2.5 justify-center",
                    active ? "bg-indigo-50 text-indigo-700" : "text-slate-500 hover:bg-slate-50 hover:text-slate-700"
                  )}>
                    <div className="relative">
                      <item.I size={20} stroke={active ? "#4f46e5" : "currentColor"}/>
                      {item.badge > 0 && (
                        <span className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">
                          {item.badge}
                        </span>
                      )}
                    </div>
                    {sbOpen && <span className="text-sm font-medium truncate">{item.l}</span>}
                  </button>
                );
              })}
            </div>
          </div>

        </nav>

        {/* User Profile */}
        <div className={cn("border-t border-slate-100 p-3 shrink-0 relative", !sbOpen && "flex justify-center")}>
          {sbOpen ? (
            <>
              <button
                onClick={() => setProfileOpen(!profileOpen)}
                className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors"
              >
                <div className="w-9 h-9 bg-gradient-to-br from-indigo-400 to-violet-500 rounded-xl flex items-center justify-center text-white text-sm font-bold shrink-0">加</div>
                <div className="flex-1 min-w-0 text-left">
                  <p className="text-sm font-medium text-slate-800 truncate">加藤</p>
                  <span className={cn("text-[10px] px-1.5 py-0.5 rounded-full font-medium", roleInfo.color)}>{roleInfo.l}</span>
                </div>
                <ic.ChevD size={16} stroke="#94a3b8"/>
              </button>
              {profileOpen && (
                <div className="absolute bottom-full left-3 right-3 mb-1 bg-white rounded-xl border border-slate-200 shadow-lg z-50 overflow-hidden slide-up">
                  <div className="p-4 border-b border-slate-100">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 bg-gradient-to-br from-indigo-400 to-violet-500 rounded-xl flex items-center justify-center text-white text-lg font-bold">加</div>
                      <div>
                        <p className="font-semibold text-slate-800">加藤</p>
                        <p className="text-xs text-slate-500">kato@shinjidai.jp</p>
                        <span className={cn("text-[10px] px-1.5 py-0.5 rounded-full font-medium mt-1 inline-block", roleInfo.color)}>{roleInfo.l}</span>
                      </div>
                    </div>
                  </div>
                  <div className="p-2">
                    {[["owner","オーナー"],["admin","管理者"],["staff","担当者"],["viewer","閲覧者"]].map(([k,l]) => (
                      <button key={k} onClick={() => { setCurrentRole(k); setProfileOpen(false); }}
                        className={cn("w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm hover:bg-slate-50 transition-colors text-left",
                          currentRole === k ? "text-indigo-700 font-medium" : "text-slate-600")}>
                        <ic.Shield size={14}/>{l}
                        {currentRole === k && <ic.Check size={14} className="ml-auto text-indigo-600"/>}
                      </button>
                    ))}
                  </div>
                  <div className="px-2 pb-2">
                    <button className="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-red-500 hover:bg-red-50 transition-colors">
                      <ic.X size={14}/>ログアウト
                    </button>
                  </div>
                </div>
              )}
            </>
          ) : (
            <button
              onClick={() => setProfileOpen(!profileOpen)}
              className="w-9 h-9 bg-gradient-to-br from-indigo-400 to-violet-500 rounded-xl flex items-center justify-center text-white text-sm font-bold cursor-pointer"
            >加</button>
          )}
        </div>
      </aside>

      {/* Main Area */}
      <div className="flex-1 flex flex-col min-w-0">
        <header className="flex items-center justify-between h-16 px-4 lg:px-6 bg-white/80 backdrop-blur-md border-b border-slate-200/60 shrink-0">
          <div className="flex items-center gap-3">
            <button onClick={() => setMob(!mob)} className="p-2 rounded-lg hover:bg-slate-100 lg:hidden"><ic.Menu size={20}/></button>
            <button onClick={() => setSb(!sbOpen)} className="p-2 rounded-lg hover:bg-slate-100 hidden lg:block"><ic.Menu size={20} stroke="#64748b"/></button>
            {/* モバイルのみロゴ表示 */}
            <div className="flex items-center gap-2 lg:hidden">
              <svg width="26" height="26" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="スマカレ">
                <defs>
                  <linearGradient id="hStarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor="#818CF8"/>
                    <stop offset="100%" stopColor="#6366F1"/>
                  </linearGradient>
                </defs>
                <circle cx="5" cy="5" r="3" fill="#6B7FA3" opacity="0.85"/>
                <circle cx="15" cy="5" r="3" fill="#6B7FA3" opacity="0.85"/>
                <polygon points="25,0.2 26.3,3.7 29.8,3.7 27,5.9 28,9.4 25,7.3 22,9.4 23,5.9 20.2,3.7 23.7,3.7" fill="url(#hStarGrad)"/>
                <circle cx="5" cy="15" r="3" fill="#6B7FA3" opacity="0.85"/>
                <circle cx="15" cy="15" r="3" fill="#6B7FA3" opacity="0.85"/>
                <circle cx="25" cy="15" r="3" fill="#6B7FA3" opacity="0.85"/>
                <circle cx="5" cy="25" r="3" fill="#6B7FA3" opacity="0.85"/>
                <circle cx="15" cy="25" r="3" fill="#6B7FA3" opacity="0.85"/>
                <circle cx="25" cy="25" r="3" fill="#6B7FA3" opacity="0.85"/>
              </svg>
              <span className="text-sm font-bold text-indigo-600">スマカレ</span>
            </div>
            <div className="hidden sm:block w-72"><SearchInput value="" onChange={() => {}} placeholder="案件ID、顧客名で検索..."/></div>
          </div>
          <div className="flex items-center gap-1.5">
            {/* エリア表示 (ヘッダー) */}
            <div className="hidden md:flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 rounded-lg border border-slate-200">
              <span className="text-sm">{areaInfo.flag}</span>
              <span className="text-xs text-slate-600 font-medium">{areaInfo.l}</span>
            </div>
            <button onClick={() => nav("settings")} className={cn(
              "p-2.5 rounded-xl transition-all",
              page === "settings" ? "bg-indigo-50 text-indigo-600" : "hover:bg-slate-100 text-slate-500"
            )} title="設定">
              <ic.Gear size={20} stroke={page === "settings" ? "#4f46e5" : "#64748b"}/>
            </button>
            <div className="relative">
              <button onClick={() => setNot(!notOpen)} className="relative p-2.5 rounded-xl hover:bg-slate-100">
                <ic.Bell size={20} stroke="#64748b"/>
                <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"/>
              </button>
              {notOpen && (
                <div className="absolute right-0 top-full mt-2 w-80 bg-white rounded-2xl shadow-xl border border-slate-200 z-50 slide-up">
                  <div className="p-4 border-b border-slate-100"><h3 className="font-bold text-sm text-slate-800">通知</h3></div>
                  <div className="max-h-80 overflow-y-auto">
                    {notifs.map(n => (
                      <div key={n.id} className="flex items-start gap-3 p-4 hover:bg-slate-50 border-b border-slate-50">
                        <div className={cn("w-8 h-8 rounded-lg flex items-center justify-center shrink-0",
                          n.type === "urgent" ? "bg-amber-100" : n.type === "cancel" ? "bg-red-100" : n.type === "auto" ? "bg-green-100" : "bg-blue-100")}>
                          {n.type === "urgent" ? <ic.Zap size={16} stroke="#d97706"/> :
                           n.type === "cancel" ? <ic.XCircle size={16} stroke="#ef4444"/> :
                           <ic.Check size={16} stroke={n.type === "auto" ? "#22c55e" : "#3b82f6"}/>}
                        </div>
                        <div><p className="text-sm text-slate-700">{n.msg}</p><p className="text-xs text-slate-400 mt-0.5">{n.time}</p></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
            {/* Web バッジ（一番右） */}
            <div className="hidden md:flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 rounded-lg">
              <ic.Monitor size={14} stroke="#6366f1"/><span className="text-[10px] text-slate-400">Web</span>
            </div>
          </div>
        </header>

        <main className="flex-1 overflow-y-auto p-4 lg:p-6 pb-20 lg:pb-6">
          <Page/>
        </main>
      </div>

      {/* ── ボトムナビゲーション（モバイル専用） ── */}
      <nav className="fixed bottom-0 left-0 right-0 z-40 lg:hidden bg-white/95 backdrop-blur-md border-t border-slate-200/60 safe-area-pb">
        <div className="flex items-center justify-around h-16 px-1">
          {[
            { id: "dashboard",        l: "ホーム",     I: ic.Grid },
            { id: "cases",            l: "案件",       I: ic.FileText },
            { id: "docs",             l: "書類",       I: ic.Folder, badge: INVOICES.filter(i => i.status === "overdue").length },
            { id: "calendar",         l: "カレンダー", I: ic.Calendar },
            { id: "line",             l: "LINE",       I: ic.Inbox, badge: LINE_MSGS.filter(m => m.status === "pending").length },
            { id: "settings/company", l: "設定",       I: ic.Gear },
          ].map(item => {
            const active = page === item.id || (item.id === "settings/company" && page.startsWith("settings/"));
            return (
              <button key={item.id} onClick={() => nav(item.id)}
                className="flex flex-col items-center gap-0.5 px-2 py-1.5 rounded-xl transition-all relative">
                <div className="relative">
                  <item.I size={22} stroke={active ? "#4f46e5" : "#94a3b8"}/>
                  {item.badge > 0 && (
                    <span className="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">
                      {item.badge}
                    </span>
                  )}
                </div>
                <span className={cn("text-[10px] font-medium", active ? "text-indigo-600" : "text-slate-400")}>{item.l}</span>
                {active && <span className="absolute top-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-indigo-500 rounded-full"/>}
              </button>
            );
          })}
        </div>
      </nav>
    </div>
    </UserCtx.Provider>
  );
}

/* ═══════════════════════════════════════════════════════
   MOUNT
   ═══════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
